<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIHERO - Tester Feedback</title>
    <link rel="icon" type="image/png" href="app_icon.png">
    <link rel="apple-touch-icon" href="app_icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #E8F4F5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #67A2A7 0%, #4A7478 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .lang-switch {
            text-align: center;
            margin-bottom: 15px;
        }

        .lang-switch button {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .lang-switch button:hover,
        .lang-switch button.active {
            background: white;
            color: #4A7478;
        }

        [lang="en"] .zh-only,
        [lang="zh-TW"] .en-only {
            display: none;
        }

        .mascot {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .mascot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #4A7478;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 140px;
            transition: border-color 0.2s;
            color: #333;
        }

        textarea:focus {
            outline: none;
            border-color: #67A2A7;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .rating-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .rating-group input[type="radio"] {
            display: none;
        }

        .rating-group label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            font-size: 1.4em;
            font-weight: normal;
            color: #999;
            transition: all 0.2s;
            margin-bottom: 0;
        }

        .rating-group input[type="radio"]:checked + label,
        .rating-group label:hover {
            border-color: #67A2A7;
            background: #67A2A7;
            color: white;
            transform: scale(1.1);
        }

        .rating-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.8em;
            color: #999;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 16px 30px;
            background: linear-gradient(135deg, #67A2A7 0%, #4A7478 100%);
            color: white;
            text-align: center;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(74, 116, 120, 0.4);
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 116, 120, 0.6);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            display: none;
            padding: 16px 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .message.error {
            background: #fdecea;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .branding {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
        }

        .branding a {
            color: #4A7478;
            text-decoration: none;
        }

        .branding a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="lang-switch">
                <button onclick="setLanguage('en')" id="btn-en">English</button>
                <button onclick="setLanguage('zh-TW')" id="btn-zh" class="active">繁體中文</button>
            </div>

            <div class="mascot">
                <img src="app_icon.png" alt="CHIHERO">
            </div>

            <h1>CHIHERO</h1>
            <p class="tagline en-only">Tester Feedback</p>
            <p class="tagline zh-only">測試者意見回饋</p>
        </div>

        <div class="content">
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="feedback">
                        <span class="en-only">Your Feedback</span>
                        <span class="zh-only">您的意見回饋</span>
                    </label>
                    <textarea id="feedback" name="feedback" required
                        class="en-only"
                        placeholder="Share your thoughts, bugs you found, or suggestions for improvement..."></textarea>
                    <textarea id="feedback-zh" name="feedback-zh"
                        class="zh-only"
                        placeholder="分享您的想法、發現的錯誤或改進建議..."></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <span class="en-only">Rating</span>
                        <span class="zh-only">評分</span>
                    </label>
                    <div class="rating-group">
                        <input type="radio" name="rating" id="r1" value="1" required>
                        <label for="r1">1</label>
                        <input type="radio" name="rating" id="r2" value="2">
                        <label for="r2">2</label>
                        <input type="radio" name="rating" id="r3" value="3">
                        <label for="r3">3</label>
                        <input type="radio" name="rating" id="r4" value="4">
                        <label for="r4">4</label>
                        <input type="radio" name="rating" id="r5" value="5">
                        <label for="r5">5</label>
                    </div>
                    <div class="rating-labels">
                        <span class="en-only">Poor</span>
                        <span class="zh-only">很差</span>
                        <span class="en-only">Excellent</span>
                        <span class="zh-only">非常好</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="en-only">Submit Feedback</span>
                    <span class="zh-only">提交意見</span>
                </button>

                <div class="message success" id="successMsg">
                    <span class="en-only">Thank you! Your feedback has been submitted.</span>
                    <span class="zh-only">感謝您！您的意見已成功提交。</span>
                </div>
                <div class="message error" id="errorMsg">
                    <span class="en-only">Something went wrong. Please try again.</span>
                    <span class="zh-only">發生錯誤，請再試一次。</span>
                </div>
            </form>
        </div>

        <div class="branding">
            <a href="index.html">
                <span class="en-only">Back to CHIHERO</span>
                <span class="zh-only">返回 CHIHERO</span>
            </a>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6xJpS5mCqMHEyQPhqfAuehttFza-9FmeD7OIlvZCtGHLkZr0NJWKcNfbL3EfRvP4/exec';

        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-zh').classList.toggle('active', lang === 'zh-TW');
            localStorage.setItem('preferredLanguage', lang);
        }

        const savedLang = localStorage.getItem('preferredLanguage') || 'zh-TW';
        setLanguage(savedLang);

        document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');
            const lang = document.documentElement.lang;

            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            btn.disabled = true;
            btn.querySelector('.en-only').textContent = 'Submitting...';
            btn.querySelector('.zh-only').textContent = '提交中...';

            const activeFeedback = lang === 'zh-TW'
                ? document.getElementById('feedback-zh').value
                : document.getElementById('feedback').value;

            const payload = {
                feedback: activeFeedback,
                rating: document.querySelector('input[name="rating"]:checked').value
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                successMsg.style.display = 'block';
                this.reset();
            } catch (err) {
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.querySelector('.en-only').textContent = 'Submit Feedback';
                btn.querySelector('.zh-only').textContent = '提交意見';
            }
        });
    </script>
</body>
</html>
